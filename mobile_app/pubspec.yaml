name: wagewise
description: "WageWise – Fair Wage Navigator for Malaysian fresh graduates"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Backend
  supabase_flutter: ^2.5.0
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0

  # PDF (UC 102)
  pdf: ^3.10.8
  path_provider: ^2.1.3
  open_filex: ^4.3.4

  # Misc
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  generate: true

  # Add asset folders here once you create them:
  # assets:
  #   - assets/images/
  #   - assets/animations/
