    justify-content: center;
    width: 100vw;
    height: 100vh;

  .phone {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 55px;

      0 0 0 2px #3a3a3c,

    overflow: hidden;
    flex-shrink: 0;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 55px;
    overflow: hidden;
    position: relative;
  }
  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 37px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }
  /* Status bar */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 59px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    z-index: 99;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }
  .status-time { letter-spacing: -0.3px; }
  .status-icons { display: flex; gap: 7px; align-items: center; }
  /* Screen content */
  .screen-content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    z-index: 100;
  }
  /* Scrollable inner */
  .inner-scroll {
    position: absolute;
    top: 59px;
    left: 0; right: 0;
    bottom: 83px;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .inner-scroll::-webkit-scrollbar { display: none; }
  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 83px;
    display: flex;
    align-items: flex-start;
    padding-top: 10px;
    z-index: 99;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    opacity: 0.45;
    transition: opacity 0.2s;
  }
  .nav-item.active { opacity: 1; }
  .nav-icon { font-size: 22px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1px; }

const SalaryScreen = ({ t }) => {
  const [predicted, setPredicted] = useState(false);
  const [loading, setLoading] = useState(false);
  const [jobTitle, setJobTitle] = useState('Software Engineer');
  const [industry, setIndustry] = useState('Information Technology');
  const [exp, setExp] = useState('0');
  const [edu, setEdu] = useState("Bachelor's Degree");
  const [loc, setLoc] = useState('Kuala Lumpur');
  const [offerVal, setOfferVal] = useState('3200');

  const handlePredict = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); setPredicted(true); }, 1200);
  };

  const offer = parseInt(offerVal) || 3200;
  const offerStatus = offer < 3500 ? 'below' : offer > 4800 ? 'above' : 'at';
  const offerColor = offerStatus === 'below' ? C.red : offerStatus === 'above' ? C.green : C.amber;
  const offerLabel = offerStatus === 'below' ? t.belowMarket : offerStatus === 'above' ? t.aboveMarket : t.atMarket;

  const inputStyle = {
    width:'100%', background: C.cardAlt, border:`1px solid ${C.border}`,
    borderRadius:12, padding:'12px 14px', color:C.text, fontSize:14,
    outline:'none', appearance:'none',
  };
  const labelStyle = { color:C.muted, fontSize:12, fontWeight:500, marginBottom:6, display:'block' };

  return (
    <div style={{ background: C.bg, minHeight:'100%', paddingBottom:16 }}>
      <div style={{ padding:'20px 22px 0' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:20 }}>
          <div style={{ width:40, height:40, borderRadius:14, background: C.accent+'22', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name="chartBar" size={20} color={C.accent} />
          </div>
          <div>
            <div style={{ color:C.text, fontWeight:700, fontSize:18 }}>{t.salaryTitle}</div>
            <div style={{ color:C.muted, fontSize:12 }}>AI-powered · Malaysian data</div>
          </div>
        </div>

        {!predicted ? (
          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
            <div>
              <label style={labelStyle}>{t.jobTitle}</label>
              <input style={inputStyle} value={jobTitle} onChange={e => setJobTitle(e.target.value)} />
            </div>
            <div>
              <label style={labelStyle}>{t.industry}</label>
              <select style={inputStyle} value={industry} onChange={e => setIndustry(e.target.value)}>
                {['Information Technology','Engineering','Business/Finance','Healthcare','Education','Marketing'].map(x => <option key={x}>{x}</option>)}
              </select>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              <div>
                <label style={labelStyle}>{t.experience}</label>
                <select style={inputStyle} value={exp} onChange={e => setExp(e.target.value)}>
                  {['0','1','2','3','4','5+'].map(x => <option key={x} value={x}>{x} yr{x!=='1'?'s':''}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>{t.education}</label>
                <select style={inputStyle} value={edu} onChange={e => setEdu(e.target.value)}>
                  {['Diploma',"Bachelor's Degree","Master's Degree",'PhD'].map(x => <option key={x}>{x}</option>)}
                </select>
              </div>
            </div>
            <div>
              <label style={labelStyle}>{t.location}</label>
              <select style={inputStyle} value={loc} onChange={e => setLoc(e.target.value)}>
                {['Kuala Lumpur','Penang','Johor Bahru','Kota Kinabalu','Kuching','Shah Alam'].map(x => <option key={x}>{x}</option>)}

            </div>
            <GradientBtn onClick={handlePredict} style={{ marginTop:4 }}>
              {loading ? '⏳ Predicting...' : t.predict}

          </div>
        ) : (

/* ── SCREEN: COST OF LIVING ─────────────────────────────────────────────── */
const COLScreen = ({ t }) => {
  const [salary, setSalary] = useState('4000');
  const [city, setCity] = useState('Kuala Lumpur');
  const [compared, setCompared] = useState(true);

  const gross = parseInt(salary) || 4000;
  const epf = Math.round(gross * 0.11);
  const socso = Math.min(Math.round(gross * 0.005), 29.75);
  const tax = gross > 5000 ? Math.round((gross - 5000) * 0.01) : 0;
  const net = gross - epf - socso - tax;

  const cities = {
    'Kuala Lumpur':   { rent:1400, food:450, transport:200, utilities:120, healthcare:80 },
    'Penang':         { rent:900,  food:380, transport:150, utilities:100, healthcare:70 },
    'Johor Bahru':    { rent:850,  food:350, transport:180, utilities:100, healthcare:70 },
    'Kota Kinabalu':  { rent:800,  food:320, transport:160, utilities:90,  healthcare:60 },
  };
  const exp = cities[city] || cities['Kuala Lumpur'];
  const totalExp = Object.values(exp).reduce((a,b)=>a+b,0);
  const disposable = net - totalExp;
  const livingWage = city==='Kuala Lumpur' ? 2900 : city==='Penang' ? 2500 : 2200;
  const meetsLW = net >= livingWage;

  const inputStyle = { width:'100%', background: C.cardAlt, border:`1px solid ${C.border}`, borderRadius:12, padding:'12px 14px', color:C.text, fontSize:14, outline:'none', appearance:'none' };
  const labelStyle = { color:C.muted, fontSize:12, fontWeight:500, marginBottom:6, display:'block' };

  const expColors = { rent:C.accent, food:C.teal, transport:C.purple, utilities:C.amber, healthcare:C.green };
  const expLabels = { rent:t.rent, food:t.food, transport:t.transport, utilities:t.utilities, healthcare:t.healthcare };

  return (
    <div style={{ background: C.bg, minHeight:'100%', paddingBottom:16 }}>
      <div style={{ padding:'20px 22px 0' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:20 }}>
          <div style={{ width:40, height:40, borderRadius:14, background: C.amber+'22', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name="map" size={20} color={C.amber} />
          </div>
          <div>
            <div style={{ color:C.text, fontWeight:700, fontSize:18 }}>{t.colTitle}</div>
            <div style={{ color:C.muted, fontSize:12 }}>Real purchasing power analysis</div>
          </div>
        </div>

        {/* Inputs */}
        <Card style={{ marginBottom:14 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <div>
              <label style={labelStyle}>{t.grossSalary}</label>
              <input type="number" style={inputStyle} value={salary} onChange={e => setSalary(e.target.value)} />
            </div>
            <div>
              <label style={labelStyle}>{t.selectCity}</label>
              <select style={inputStyle} value={city} onChange={e => setCity(e.target.value)}>
                {Object.keys(cities).map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
        </Card>

        {/* Deductions */}
        <Card style={{ marginBottom:14 }}>
          <div style={{ color:C.text, fontWeight:700, fontSize:15, marginBottom:12 }}>{t.afterDeductions}</div>
          {[
            { label: t.epf, val: -epf, color: C.accent },
            { label: t.socso, val: -socso, color: C.purple },
            { label: t.tax, val: tax===0 ? 0 : -tax, color: C.amber },
          ].map(d => (
            <div key={d.label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
              <span style={{ color:C.muted, fontSize:13 }}>{d.label}</span>
              <span style={{ color: d.val < 0 ? C.red : C.green, fontWeight:600, fontSize:13 }}>
                {d.val < 0 ? `–RM ${Math.abs(d.val)}` : d.val===0 ? 'RM 0' : `–RM ${d.val}`}

            </div>
          ))}
          <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:10, display:'flex', justifyContent:'space-between' }}>
            <span style={{ color:C.text, fontWeight:700, fontSize:15 }}>{t.netPay}</span>
            <span style={{ color:C.teal, fontWeight:800, fontSize:18 }}>RM {net.toLocaleString()}</span>
          </div>
          {/* Living wage indicator */}
          <div style={{ marginTop:10, padding:'8px 12px', background: meetsLW ? C.green+'18' : C.red+'18', borderRadius:10, border:`1px solid ${meetsLW ? C.green : C.red}33` }}>
            <span style={{ color: meetsLW ? C.green : C.red, fontSize:12, fontWeight:600 }}>
              {meetsLW ? `✅ Meets living wage for ${city} (RM ${livingWage})` : `⚠️ Below living wage for ${city} (RM ${livingWage})`}
            </span>
          </div>
        </Card>

        {/* Expenses */}
        <Card style={{ marginBottom:14 }}>
          <div style={{ color:C.text, fontWeight:700, fontSize:15, marginBottom:12 }}>{t.expenses} – {city}</div>
          {Object.entries(exp).map(([key, val]) => (
            <div key={key} style={{ marginBottom:10 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                <span style={{ color:C.muted, fontSize:12 }}>{expLabels[key]}</span>
                <span style={{ color:C.text, fontSize:12, fontWeight:600 }}>RM {val}</span>
              </div>
              <div style={{ height:5, background:'rgba(255,255,255,0.08)', borderRadius:3, overflow:'hidden' }}>
                <div style={{ width:`${(val/1400)*100}%`, height:'100%', background:expColors[key], borderRadius:3 }} />
              </div>
            </div>
          ))}
          <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:10, display:'flex', justifyContent:'space-between' }}>
            <span style={{ color:C.text, fontWeight:700 }}>Total Expenses</span>
            <span style={{ color:C.red, fontWeight:700 }}>RM {totalExp}</span>
          </div>
        </Card>

        {/* Disposable */}
        <Card style={{ background:`linear-gradient(135deg, ${disposable>0?'#0f2a0f':'#2a0f0f'}, #0e1420)`, border:`1px solid ${disposable>0?C.green:C.red}44`, marginBottom:14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div>
              <div style={{ color:C.muted, fontSize:12, marginBottom:4 }}>{t.disposable}</div>
              <div style={{ color: disposable>0 ? C.green : C.red, fontWeight:800, fontSize:28 }}>
                {disposable >= 0 ? '+' : '–'}RM {Math.abs(disposable).toLocaleString()}
              </div>
            </div>
            <div style={{ width:64, height:64, borderRadius:32, background: disposable>0?C.green+'22':C.red+'22', display:'flex', alignItems:'center', justifyContent:'center', border:`2px solid ${disposable>0?C.green:C.red}44` }}>
              <span style={{ fontSize:28 }}>{disposable>0?'💚':'⚠️'}</span>
            </div>
          </div>
        </Card>

        {/* City comparison */}
        <div style={{ color:C.text, fontWeight:700, fontSize:15, marginBottom:12 }}>City Comparison (RM {gross.toLocaleString()} gross)</div>
        {Object.entries(cities).map(([c, e]) => {
          const cNet = gross - Math.round(gross*0.11) - Math.min(Math.round(gross*0.005),29.75);
          const cExp = Object.values(e).reduce((a,b)=>a+b,0);
          const cDisp = cNet - cExp;
          const isSelected = c === city;
          return (
            <Card key={c} onClick={() => setCity(c)} style={{ marginBottom:10, cursor:'pointer', border: isSelected ? `1px solid ${C.accent}66` : `1px solid ${C.border}`, background: isSelected ? '#1a3a6e33' : C.card }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <div>
                  <div style={{ color:C.text, fontWeight:600, fontSize:14 }}>{c} {isSelected && '●'}</div>
                  <div style={{ color:C.muted, fontSize:11, marginTop:2 }}>Net: RM {cNet.toLocaleString()} · Exp: RM {cExp}</div>
                </div>
                <div style={{ textAlign:'right' }}>
                  <div style={{ color: cDisp>0?C.green:C.red, fontWeight:700, fontSize:16 }}>
                    {cDisp>=0?'+':'–'}RM {Math.abs(cDisp)}
                  </div>
                  <div style={{ color:C.muted, fontSize:10, marginTop:2 }}>{t.disposable}</div>
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
};

/* ── SCREEN: PROFILE ────────────────────────────────────────────────────── */
const ProfileScreen = ({ t, lang, setLang }) => {
  const langs = [ { key:'en', label:'English' }, { key:'bm', label:'Bahasa Malaysia' }, { key:'zh', label:'中文' }, { key:'ta', label:'தமிழ்' } ];
  return (
    <div style={{ background: C.bg, minHeight:'100%', paddingBottom:16 }}>
      <div style={{ padding:'20px 22px 0' }}>
        {/* Avatar */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:24 }}>
          <div style={{ width:80, height:80, borderRadius:40, background:`linear-gradient(135deg,${C.accent},${C.teal})`, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:12, boxShadow:`0 8px 32px ${C.accentGlow}` }}>
            <span style={{ color:'#fff', fontWeight:800, fontSize:28 }}>XS</span>
          </div>
          <div style={{ color:C.text, fontWeight:700, fontSize:20 }}>Chew Xu Sheng</div>
          <div style={{ color:C.muted, fontSize:13 }}>{t.degree}</div>
          <div style={{ color:C.dimmed, fontSize:12 }}>{t.university}</div>
          <div style={{ display:'flex', gap:8, marginTop:12 }}>
            <Tag label="Final Year Student" color={C.accent} />
            <Tag label="IT / CS" color={C.teal} />
          </div>
        </div>

        {/* Stats */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:20 }}>
          {[
            { label: t.salaryGoal, val:'RM 4,500', color: C.accent },
            { label: t.negotiationScore, val:'78 / 100', color: C.teal },
            { label: 'Reports', val:'3 saved', color: C.purple },
          ].map(s => (
            <Card key={s.label} style={{ padding:'12px 10px', textAlign:'center' }}>
              <div style={{ color:s.color, fontWeight:800, fontSize:15 }}>{s.val}</div>
              <div style={{ color:C.muted, fontSize:10, marginTop:3, lineHeight:1.3 }}>{s.label}</div>
            </Card>
          ))}
        </div>

        {/* Language switcher */}
        <Card style={{ marginBottom:14 }}>
          <div style={{ color:C.text, fontWeight:600, fontSize:14, marginBottom:12 }}>🌐 Language / Bahasa / 语言 / மொழி</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
            {langs.map(l => (
              <button key={l.key} onClick={() => setLang(l.key)} style={{
                padding:'10px', border: lang===l.key ? `1px solid ${C.accent}88` : `1px solid ${C.border}`,
                borderRadius:12, background: lang===l.key ? C.accent+'22' : 'transparent',
                color: lang===l.key ? C.accent : C.muted, fontSize:13, fontWeight:600, cursor:'pointer', transition:'all 0.2s',
              }}>{l.label}</button>
            ))}
          </div>
        </Card>

        {/* Settings list */}
        {[
          { icon:'doc', label:'Saved Reports', sub:'3 reports', color:C.accent },
          { icon:'settings', label:'Notifications', sub:'On', color:C.amber },
          { icon:'shield', label:'Privacy', sub:'Data encrypted', color:C.green },
          { icon:'info', label:'About WageWise', sub:'v1.0 · TAR UMT FYP 2026', color:C.muted },
        ].map((s,i) => (
          <Card key={i} style={{ marginBottom:10, display:'flex', gap:14, alignItems:'center', cursor:'pointer' }}>
            <div style={{ width:40, height:40, borderRadius:14, background: s.color+'22', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <Icon name={s.icon} size={18} color={s.color} />
            </div>
            <div style={{ flex:1 }}>
              <div style={{ color:C.text, fontWeight:600, fontSize:14 }}>{s.label}</div>
              <div style={{ color:C.muted, fontSize:12, marginTop:1 }}>{s.sub}</div>
            </div>
            <Icon name="chevRight" size={18} color={C.dimmed} />
          </Card>
        ))}
      </div>
    </div>
  );
};

/* ── BOTTOM NAV ─────────────────────────────────────────────────────────── */
const BottomNav = ({ tab, setTab, t, navBg }) => {
  const items = [
    { key:'home',    icon:'home',     label: t.navHome },
    { key:'salary',  icon:'salary',   label: t.navSalary },
    { key:'chat',    icon:'chat',     label: t.navChat },
    { key:'col',     icon:'col',      label: t.navCOL },
    { key:'profile', icon:'profile',  label: t.navProfile },
  ];
  const activeColor = [
    { key:'home',    color:C.accent },
    { key:'salary',  color:C.accent },
    { key:'chat',    color:C.purple },
    { key:'col',     color:C.amber },
    { key:'profile', color:C.teal },
  ];
  const ac = activeColor.find(a => a.key===tab)?.color || C.accent;
  return (
    <div className="bottom-nav" style={{ background: navBg || 'rgba(14,27,46,0.96)', backdropFilter:'blur(20px)', borderTop:`1px solid ${C.border}` }}>
      {items.map(item => (
        <div key={item.key} className={`nav-item ${tab===item.key?'active':''}`} onClick={() => setTab(item.key)}>
          <Icon name={item.icon} size={22} color={tab===item.key ? ac : '#fff'} />
          <span className="nav-label" style={{ color: tab===item.key ? ac : '#888' }}>{item.label}</span>
        </div>
      ))}
    </div>
  );
};

/* ── STATUS BAR ─────────────────────────────────────────────────────────── */
const StatusBar = ({ dark=false }) => (
  <div className="status-bar" style={{ color: dark ? '#000' : '#fff' }}>
    <span className="status-time">9:41</span>
    <div className="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill={dark?'#000':'#fff'}><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="1" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 20 15" fill={dark?'#000':'#fff'}><path d="M10 3C6.5 3 3.4 4.5 1.2 7L0 5.6C2.6 2.7 6.1 1 10 1s7.4 1.7 10 4.6L18.8 7C16.6 4.5 13.5 3 10 3z"/><path d="M10 7c-2 0-3.8.8-5.1 2.2L3.7 8C5.4 6.1 7.6 5 10 5s4.6 1.1 6.3 3l-1.2 1.2C13.8 7.8 12 7 10 7z"/><circle cx="10" cy="13" r="2"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke={dark?'#000':'#fff'} strokeOpacity="0.35"/><rect x="2" y="2" width="17" height="8" rx="2" fill={dark?'#000':'#fff'}/><path d="M23 4v4a2 2 0 000-4z" fill={dark?'#000':'#fff'} fillOpacity="0.4"/></svg>
    </div>
  </div>
);

/* ── MAIN APP ───────────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#3B82F6",
  "showOnboarding": true,
  "darkMode": true,
  "fontSize": 14
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [screen, setScreen] = useState('onboarding');
  const [tab, setTab] = useState('home');
  const [lang, setLang] = useState('en');
  const t = T[lang] || T.en;

  const navigate = (to) => {
    setTab(to);
    setScreen('app');
  };

  return (
    <>
      <div className="phone">
        <div className="phone-screen" style={{ background: C.bg }}>
          <div className="dynamic-island" />
          <StatusBar />

          {screen === 'onboarding' && tweaks.showOnboarding ? (
            <div className="screen-content">
              <OnboardingScreen t={t} onDone={() => setScreen('app')} />
            </div>
          ) : (
            <>
              <div className="inner-scroll">
                {tab === 'home'    && <HomeScreen t={t} navigate={navigate} />}
                {tab === 'salary'  && <SalaryScreen t={t} />}
                {tab === 'chat'    && <ChatScreen t={t} />}
                {tab === 'col'     && <COLScreen t={t} />}
                {tab === 'profile' && <ProfileScreen t={t} lang={lang} setLang={setLang} />}
              </div>
              <BottomNav tab={tab} setTab={setTab} t={t} />
            </>
          )}

          <div className="home-indicator" />
        </div>
      </div>

      <TweaksPanel>
        <TweakSection title="Appearance">
          <TweakColor label="Accent Color" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
          <TweakToggle label="Show Onboarding" value={tweaks.showOnboarding} onChange={v => setTweak('showOnboarding', v)} />
        </TweakSection>
        <TweakSection title="Navigation">
          {screen === 'onboarding' ? null : (
            <>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {['home','salary','chat','col','profile'].map(s => (
                  <button key={s} onClick={() => { setTab(s); setScreen('app'); }}
                    style={{ padding:'8px 12px', background: tab===s ? C.accent+'33' : C.card, border:`1px solid ${tab===s?C.accent:C.border}`, borderRadius:8, color: tab===s?C.accent:C.muted, cursor:'pointer', fontSize:13, textAlign:'left' }}>
                    {s.charAt(0).toUpperCase()+s.slice(1)}
                  </button>
                ))}
              </div>
            </>
          )}
        </TweakSection>
        <TweakSection title="Language">
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
            {[['en','English'],['bm','BM'],['zh','中文'],['ta','தமிழ்']].map(([k,l]) => (
              <button key={k} onClick={() => setLang(k)} style={{ padding:'7px', background: lang===k?C.accent+'33':C.card, border:`1px solid ${lang===k?C.accent:C.border}`, borderRadius:8, color:lang===k?C.accent:C.muted, cursor:'pointer', fontSize:12, fontWeight:600 }}>{l}</button>
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
